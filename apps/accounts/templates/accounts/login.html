{% extends "base.html" %}
{% block title %}UCMS - Login Page{% endblock %}

{% block content %}

<section class="login-container">
    <form method="post">

        {% csrf_token %}

        <div class="login-card">
            <div class="card-header text-center mb-4 border-0">
                <h2 class="display-5">Login</h2>
                <p>please enter your credential</p>
            </div>

            {% if form.non_field_errors %}
                <div class="alert alert-danger">
                    {% for error in form.non_field_errors %}
                        {{ error }}
                    {% endfor %}
                </div>
            {% endif %}

            <div class="form-group mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" placeholder="addisu" name="username" id="username">
            </div>
            <div class="form-group mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="********" name="password" id="password">
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>

            <div class="d-flex align-items-center justify-content-between">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input">
                    <label for="rememberme" class="form-check-label">Remember me</label>
                </div>
                <a href="#" class="text-decoration-none forget-password">forget password?</a>
            </div>
        </div>
    </form>
</section>

{% endblock %}
