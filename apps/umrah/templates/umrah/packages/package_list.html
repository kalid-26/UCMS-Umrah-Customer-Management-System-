{% extends "layouts/base_dashboard.html" %}
{% block base_dashboard %}

<div class="d-flex align-items-center justify-content-between">
    <h3>Packages</h3>
    <div class="mb-3">
        <a href="{% url "umrah:package-add" %}" class="btn btn-primary"><i class="bi bi-plus"></i> Add Package</a>
    </div>
</div>

<table class="table table-striped table-hover table-dark table-bordered">
    <thead>
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Duration Days</th>
        </tr>
    </thead>

    <tbody class="">
        <tr>
            {% for package in packages %}
            <td>{{package.name}}</td>
            <td>{{package.price}}</td>
            <td>{{package.duration_days}}</td>
            <td>
                <a href="{% url "umrah:package-detail" package.pk %}" class="btn btn-sm btn-info">
                    <i class="bi bi-eye"></i>
                    View
                </a>
                <a href="{% url "umrah:package-edit" package.pk %}" class="btn btn-sm btn-info">
                    <i class="bi bi-pen"></i>
                    Edit
                </a>
                <form method="post" action="{% url "umrah:package-archive" package.pk %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-danger">
                        <i class="bi bi-archive"></i>
                        Archive
                    </button>
                </form>
            </td>
        </tr>
        
        {% empty %}
        <tr>
            <td colspan="4">No Packages Found.</td>
        </tr>

        {% endfor %}
    </tbody>
</table>

{% endblock %}
