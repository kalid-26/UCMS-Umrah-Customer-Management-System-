{% extends "base.html" %}
{% block title %}UCMS - Login Page{% endblock %}

{% block content %}

<section class="login-container">
    <form action="#">
        <div class="login-card">
            <div class="card-header text-center mb-4 border-0">
                <h2 class="display-5">Login</h2>
                <p>please enter your credential</p>
            </div>

            <div class="form-group mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="example@gmail.com" name="email">
            </div>
            <div class="form-group mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="********" name="password">
            </div>

            <button class="btn btn-primary w-100 mb-3">Login</button>
            <div class="d-flex align-items-center justify-content-between">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input">
                    <label for="rememberme" class="form-check-label">Remember me</label>
                </div>
                <a href="#" class="text-decoration-none forget-password">forget password?</a>
            </div>
        </div>
    </form>
</section>

{% endblock %}
